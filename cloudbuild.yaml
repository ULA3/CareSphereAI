steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/caresphere-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/caresphere-backend:$COMMIT_SHA'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'caresphere'
      - '--image'
      - 'gcr.io/$PROJECT_ID/caresphere-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
images:
  - 'gcr.io/$PROJECT_ID/caresphere-backend:$COMMIT_SHA'
